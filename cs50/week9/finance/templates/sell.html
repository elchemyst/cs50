{% extends "layout.html" %}

{% block title %}
    Sell
{% endblock %}

{% block main %}
<form action="/sell" method="post">
    <div class="mb-3">
        <select class="form-select mx-auto w-auto" name="symbol">
            <option value="" disabled selected>Select Stock</option>
            {% for stock in stocks %}
                {% if stock["shares"] > 0 %}
                    <option value="{{ stock["symbol"] }}">{{ stock["symbol"] }} ({{ stock["shares"] }})</option>
                {% endif %}
            {% endfor %}
          </select>
    </div>
    <div class="mb-3">
        <input class="form-control mx-auto w-auto" name="shares" placeholder="Quantity" type="text">
    </div>
    <button class="btn btn-primary" type="submit">Sell</button>
</form>
{% endblock %}
